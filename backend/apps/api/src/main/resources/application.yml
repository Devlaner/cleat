spring:
  application:
    name: cleat-api
  datasource:
    url: jdbc:postgresql://localhost:5432/cleat_db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    db:
      enabled: true
    redis:
      enabled: true
