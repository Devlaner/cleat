spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
  data:
    redis:
      host: localhost
      port: 6379

github:
  app-id: "test-app-id"
  private-key-path: "/tmp/test-key.pem"

cleat:
  workflow-scan:
    interval-ms: 3600000