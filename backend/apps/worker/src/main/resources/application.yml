spring:
  application:
    name: cleat-worker
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:cleat_db}
    username: ${DB_USERNAME:cleat}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true
cleat:
  workflow-scan:
    interval-ms: 3600000