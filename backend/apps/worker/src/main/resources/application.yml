spring:
  application:
    name: cleat-worker
  datasource:
    url: jdbc:postgresql://localhost:5432/cleat_db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  data:
   redis:
    host: localhost
    port: 6379

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true